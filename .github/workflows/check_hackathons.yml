name: Check Hackathons Milano

on:
  schedule:
    # 11:00 UTC = 12:00 CET (inverno) / 13:00 CEST (estate)
    # GitHub Actions non gestisce il DST — offset di 1h in estate
    - cron: '0 11 * * *'
  workflow_dispatch: # Lancio manuale dalla tab Actions → "Run workflow"

concurrency:
  group: hackathon-monitor
  cancel-in-progress: false   # Aspetta il run corrente invece di cancellarlo

permissions:
  contents: write  # Necessario per auto-commit

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Run Hackathon Monitor
        env:
          EVENTBRITE_API_KEY: ${{ secrets.EVENTBRITE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MEETUP_API_KEY: ${{ secrets.MEETUP_API_KEY }}
        run: python main.py

      - name: Pre-render static site (SSG)
        run: python scripts/build_static_site.py

      - name: Upload run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hackathon-monitor-report
          path: data/last_report.json
          if-no-files-found: ignore

      - name: Commit updated data and page
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update events + page + readme [skip ci]"
          file_pattern: data/events.json docs/index.html README.md
