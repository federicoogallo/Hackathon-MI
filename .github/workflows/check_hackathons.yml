name: Check Hackathons Milano

on:
  schedule:
    # 11:00 UTC = 12:00 CET (inverno) / 13:00 CEST (estate)
    # GitHub Actions non gestisce il DST — offset di 1h in estate
    - cron: '0 11 * * *'
  workflow_dispatch: # Lancio manuale dalla tab Actions → "Run workflow"

permissions:
  contents: write  # Necessario per auto-commit

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Hackathon Monitor
        env:
          EVENTBRITE_API_KEY: ${{ secrets.EVENTBRITE_API_KEY }}
          GOOGLE_CSE_API_KEY: ${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit updated data and page
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update events + page [skip ci]"
          file_pattern: data/events.json docs/index.html
