<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hackathon Milano</title>
<style>
  :root {{
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3e;
    --accent: #6c63ff;
    --accent2: #00d2ff;
    --text: #e0e0e0;
    --muted: #8888aa;
    --tag-bg: #23263a;
  }}
  * {{ box-sizing: border-box; margin: 0; padding: 0; }}
  body {{
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height: 1.6;
    padding: 2rem 1rem 4rem;
  }}
  header {{
    max-width: 720px;
    margin: 0 auto 2.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
  }}
  header h1 {{
    font-size: 1.7rem;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: .3rem;
  }}
  header p {{ color: var(--muted); font-size: 0.9rem; }}
  .count-badge {{
    display: inline-block;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 12px;
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: .6rem;
  }}
  .cards {{
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }}
  .card {{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.4rem;
    transition: border-color .2s;
  }}
  .card:hover {{ border-color: var(--accent); }}
  .card-title {{
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: .5rem;
  }}
  .card-title a {{
    color: var(--text);
    text-decoration: none;
  }}
  .card-title a:hover {{ color: var(--accent2); }}
  .meta {{
    display: flex;
    flex-wrap: wrap;
    gap: .4rem .8rem;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: .6rem;
  }}
  .meta span {{ display: flex; align-items: center; gap: .25rem; }}
  .desc {{
    font-size: 0.85rem;
    color: #aaa;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }}
  .tag {{
    display: inline-block;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1px 8px;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: .5rem;
  }}
  .empty {{
    max-width: 720px;
    margin: 3rem auto;
    text-align: center;
    color: var(--muted);
  }}
  footer {{
    max-width: 720px;
    margin: 3rem auto 0;
    text-align: center;
    font-size: 0.78rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 1rem;
  }}
</style>
</head>
<body>


<header>
  <h1>🏆 Hackathon Milano</h1>
  <p>Hackathon futuri confermati a Milano e dintorni.</p>
  <span class="count-badge">0 eventoi · Ultima scansione: 02 Mar 2026 alle 13:29</span>
</header>
<main class="cards">


<div class="empty">
  <p style="font-size:2rem">🔍</p>
  <p>Nessun hackathon futuro confermato al momento.</p>
  <p style="margin-top:.5rem;font-size:.85rem">La lista si aggiorna automaticamente ogni giorno.</p>
</div>

</main>

<footer>
  Aggiornato automaticamente · <a href="https://github.com/federicoogallo/Hackathon-MI" style="color:#6c63ff">Hackathon-MI</a>
</footer>
</body>
</html>
